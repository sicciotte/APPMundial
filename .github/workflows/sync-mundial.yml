name: Sincronizar resultados Mundial

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests google-auth google-auth-httplib2 openpyxl pandas

      - name: Crear archivo Service Account
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > service-account.json

      - name: Debug API estructura
        run: |
          python3 -c "
          import requests, json
          r = requests.get('https://worldcup26.ir/get/games')
          data = r.json()
          games = data if isinstance(data, list) else data.get('games', data.get('matches', data.get('data', [])))
          statuses = set(str(g.get('status', g.get('matchStatus', g.get('state', '?')))) for g in games)
          print('Status values:', statuses)
          finished = [g for g in games if g.get('status') not in ('scheduled', 'upcoming', None)]
          print('Partidos no scheduled:', len(finished))
          if finished:
              print(json.dumps(finished[0], ensure_ascii=False, indent=2))
          else:
              print(json.dumps(games[0], ensure_ascii=False, indent=2))
          "

      - name: Sincronizar resultados
        run: python sincronizar-resultados.py --service-account service-account.json

      - name: Limpiar credenciales
        if: always()
        run: rm -f service-account.json
        if: always()
        run: rm -f service-account.json
