name: Sincronizar resultados Mundial

on:
  schedule:
    # Cada 30 minutos (más resiliente que cada hora)
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests google-auth google-auth-httplib2

      - name: Crear archivo Service Account
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > service-account.json

      - name: Sincronizar resultados
        run: python sincronizar-resultados.py --service-account service-account.json

      - name: Limpiar credenciales
        if: always()
        run: rm -f service-account.json

      - name: Mantener repo activo (evita que GitHub desactive el workflow)
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          echo "$(date -u)" > .last-sync
          git add .last-sync
          git diff --staged --quiet || git commit -m "sync: $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push || true
